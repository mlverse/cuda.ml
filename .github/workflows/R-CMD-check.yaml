on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R-CMD-check

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 120
    outputs:
      image: ghcr.io/${{ github.repository }}-ci:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-ci:${{ github.sha }}
          build-args: |
            CUML_VERSION=21.12
            CMAKE_CUDA_ARCHITECTURES=75

  test-gpu:
    needs: build-image
    if: ${{ always() && needs.build-image.result == 'success' }}
    concurrency:
      group: gpu-tests
    runs-on:
      - "runs-on=${{ github.run_id }}/family=g4dn.xlarge/image=ubuntu24-gpu-x64/spot=true"
    container:
      image: ${{ needs.build-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --gpus all --runtime=nvidia
    timeout-minutes: 60
    env:
      NOT_CRAN: true

    steps:
      - name: Verify GPU access
        run: nvidia-smi

      - name: Session info
        run: |
          Rscript -e "sessionInfo()"
          Rscript -e "library(cuda.ml)"

      - name: Run tests
        run: |
          Rscript -e "testthat::test_package('cuda.ml', reporter = 'progress')"
